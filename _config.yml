title: nixwerk
description: Practical notes on NixOS, Neovim, tmux, and reproducible Python workflows.
url: "https://nixwerk.de"
baseurl: ""

markdown: kramdown
permalink: /:categories/:title/

exclude:
  - .direnv
  - .git
  - .gitignore
  - _site
  - Gemfile
  - Gemfile.lock
  - Justfile
  - README.md
  - jekyll_starter.md

collections:
  pages:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: default
